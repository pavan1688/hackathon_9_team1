apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: java
    spec:
      containers:
      - name: java-app
        image: <dockerimage>:1.23
        ports:
        - containerPort: 80
